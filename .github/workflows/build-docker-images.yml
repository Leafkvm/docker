name: Build And Push Docker Images

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: build-and-push-docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DOCKER_BUILDKIT: 1
      DOCKERHUB_NAMESPACE: lazymio
      IMAGE_NAME: leafkvm
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker version

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build base image
        run: docker build -f base.Dockerfile -t "$DOCKERHUB_NAMESPACE/$IMAGE_NAME:base" .

      - name: Build dev image
        run: docker build -f dev.Dockerfile --build-arg BASE_IMAGE="$DOCKERHUB_NAMESPACE/$IMAGE_NAME:base" -t "$DOCKERHUB_NAMESPACE/$IMAGE_NAME:dev" .

      - name: Push base image
        run: docker push "$DOCKERHUB_NAMESPACE/$IMAGE_NAME:base"

      - name: Push dev image
        run: docker push "$DOCKERHUB_NAMESPACE/$IMAGE_NAME:dev"